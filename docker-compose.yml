services:
  # ─────────────────────────────────────────────
  # Gclaw Agent (one-shot query)
  #   docker compose run --rm gclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  gclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./config/config.example.json:/home/gclaw/.gclaw/config.json:ro
      - gclaw-workspace:/home/gclaw/.gclaw/workspace
    entrypoint: ["gclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Gclaw Gateway (Long-running Bot)
  #   docker compose up gclaw-gateway
  # ─────────────────────────────────────────────
  gclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      # Configuration file
      - ./config/config.example.json:/home/gclaw/.gclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - gclaw-workspace:/home/gclaw/.gclaw/workspace
    command: ["gateway"]

volumes:
  gclaw-workspace:
